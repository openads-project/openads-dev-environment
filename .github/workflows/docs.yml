name: docs

on:
  workflow_call:

jobs:
  doxygen:
    runs-on: ubuntu-latest
    env:
      DOXYGEN_PROJECT_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Get latest release tag
        id: get-latest-tag
        uses: actions-ecosystem/action-get-latest-tag@v1
        with:
          semver_only: true
      - name: Export DOXYGEN_PROJECT_NUMBER
        run: echo "DOXYGEN_PROJECT_NUMBER=${{ steps.get-latest-tag.outputs.tag }}" >> $GITHUB_ENV
      - name: Checkout doxygen-awesome-css
        uses: actions/checkout@v4
        with:
          repository: jothepro/doxygen-awesome-css
          ref: v2.4.1
          path: doxygen-awesome-css
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate contribution chart
        run: |
          pip install matplotlib pyyaml cairosvg
          python .openads-dev-environment/scripts/generate_contribution_chart.py \
            --repo . \
            --mapping .openads-dev-environment/scripts/contribution_mapping.yml \
            --output docs/contribution_chart.png \
            --title "Contributions by Organization"
      - name: Run Doxygen
        uses: mattnotmitt/doxygen-action@v1
        with:
          doxyfile-path: .openads-dev-environment/Doxyfile
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/html
