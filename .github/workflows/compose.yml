name: compose

on:
  workflow_call:
    inputs:
      compose-file:
        description: Path to the Docker Compose file to publish
        required: false
        type: string
        default: docker/compose/docker-compose.yml
      image-name:
        description: Image name to publish the Docker Compose artifact to
        required: false
        type: string
        default: ghcr.io/${{ github.repository }}
      image-tag:
        description: Image tag to publish the Docker Compose artifact to
        required: false
        type: string
        default: compose-${{ github.ref_name }}

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Slugify ref name
        id: slugify-ref-name
        uses: gacts/github-slug@v1
        with:
          to-slug: ${{ inputs.image-tag }}

      - name: Prepare artifact tag
        id: artifact
        shell: bash
        run: |
          compose_file="${{ inputs.compose-file }}"
          if [[ ! -f "${compose_file}" ]]; then
            echo "Missing ${compose_file}" >&2
            exit 1
          fi

          echo "compose-file=${compose_file}" >> "${GITHUB_OUTPUT}"
          echo "image=${IMAGE_NAME,,}" >> "${GITHUB_OUTPUT}"
          echo "tag=${{ steps.slugify-ref-name.outputs.slug }}" >> "${GITHUB_OUTPUT}"
        env:
          IMAGE_NAME: ${{ inputs.image-name }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Compose artifact
        run: |
          docker compose \
            -f "${{ steps.artifact.outputs.compose-file }}" \
            publish "${{ steps.artifact.outputs.image }}:${{ steps.artifact.outputs.tag }}"
