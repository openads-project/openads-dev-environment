name: consistency

on:
  workflow_call:
    inputs:
      skip-checks:
        description: Comma-separated consistency check IDs to skip
        required: false
        type: string
        default: ""

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies via apt
        run: sudo apt-get update && sudo apt-get install -y doxygen
      - name: Install dependencies via pip
        run: python3 -m pip install -r .openads-dev-environment/scripts/requirements.txt
      - name: Run consistency checks
        env:
          CONSISTENCY_CHECKS_SKIP: ${{ inputs.skip-checks }}
        run: python3 .openads-dev-environment/scripts/check_repository_consistency.py --skip "$CONSISTENCY_CHECKS_SKIP"
