name: consistency

on:
  workflow_call:

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies via apt
        run: sudo apt-get update && sudo apt-get install -y doxygen
      - name: Install dependencies via pip
        run: python3 -m pip install -r .openads-dev-environment/scripts/requirements.txt
      - name: Run consistency checks
        run: python3 .openads-dev-environment/scripts/check_repository_consistency.py
