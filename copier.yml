_min_copier_version: "9.2.0"
_subdirectory: template
_answers_file: .copier-answers.yml

_message_after_copy: |
  Shared development environment initialized.
  Commit the generated files including .copier-answers.yml.
  Run `copier update` later to pull template changes.

_message_after_update: |
  Shared development environment updated.
  Review diffs and commit the result.

_skip_if_exists:
  - .devcontainer/devcontainer.local.json
  - .vscode/settings.local.json
  - Doxyfile.local
