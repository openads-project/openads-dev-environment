repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        args: [--style=file:.vscode/format/.clang-format]
        types_or: [c++]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
    - id: ruff-check
      args: [--fix, --config, .vscode/format/ruff.toml]
    - id: ruff-format
      args: [--config, .vscode/format/ruff.toml]
